    notes: |
      ECS is the source of truth for all game state (guardrail ecs-state.mdc).
      Resources: tapCounter, clueBoardState (5 slots), gamePhase, caseLayout, currentScore,
      starsEarned, selectedSuspect, correctSuspect.
      Actions: tapHotspot, accuse, retryCase, continueCase.
      Transactions: decrementTapCounter, fillClueBoardSlot, setGamePhase, addScore.
      No Math.random() in actions — seeded RNG passed via action payload (guardrail #9).
      No Pixi imports in ECS actions — return animation metadata, controller animates.
      Bridge to SolidJS signals for HUD, loss/win screens.
      Plugin property order: extends → services → components → resources → archetypes → computed → transactions → actions → systems.

