# ============================================================================
# RISK AREAS
# ============================================================================

risk_areas:
  - feature: gameplay-screen
    reason: "GameController is the central integration point — touches renderer, ECS state, input, HUD, viewport layout, and all game mechanics. Failure here blocks all gameplay features."

  - feature: hotspot-system
    reason: "Core interaction system: touches renderer, ECS state, input routing, and animation event queue. Must be correct for all game mechanics to work. 12+ files depend on it downstream."

  - feature: ecs-game-state
    reason: "ECS plugin is the single source of truth for all game state; bridgeEcsToSignals drives all DOM reactivity. Incorrect plugin property ordering or impure actions will produce silent failures across multiple systems."

  - feature: scene-generation-algorithm
    reason: "Six-step algorithm with solvability check, seeded RNG, and fallback chain. Incorrect seeding or solvability logic produces unplayable or trivially easy levels. Requires comprehensive test coverage."

# ============================================================================
# WARNINGS (collision detection per precedence.md)
# ============================================================================

warnings:
  - "collision:screen-id-results-language — gdd='Level Complete Screen' + 'Loss Screen' as named screens vs skill=scaffold supports exactly 4 IDs (loading|start|game|results) — critical (guardrail: scaffold-state § valid screen IDs). Plan must map Level Complete → results/win branch and Loss → results/loss branch; no new top-level screen IDs."
  - "collision:results-screen-content — gdd=villain-unmasking-animation + star-rating + case-title vs scaffold=ResultsScreen.tsx shows 'Game Over' text + generic score display — soft (content-gap, not broken invariant). Plan resolves by replacing ResultsScreen content with GDD-specified win sequence."
  - "collision:results-screen-language — gdd='The mystery got away… for now!' + 'Try Again' vs scaffold=ResultsScreen 'Game Over' heading — soft. Plan resolves: GDD language wins, scaffold text replaced."
  - "collision:gameController-mode — gdd=pixi-gpu-canvas-game vs scaffold=gameController.ts using gameMode:'dom' (DOM placeholder) — soft (DOM mode is an infrastructure default, not a rule). Plan resolves: replace DOM mode with pixi mode per GDD."
  - "collision:audio-sprite-key — gdd=audio-sprite-json (assumed 'src' key convention) vs skill=asset-bundles.mdc requires 'urls' key — critical (guardrail: asset-bundles.mdc § audio sprite JSON). Plan must enforce 'urls' key in all audio sprite JSON definitions."

# ============================================================================
# OPEN QUESTIONS
# ============================================================================

open_questions:
  - id: q-game-name
    question: "What is the game's slug? The GDD title is 'Scooby-Doo: Clue Chasers' — what slug should replace 'mygame' in src/game/mygame/?"
    context: "Plan phase resolves q-game-name. GDD title suggests 'clue-chasers' but branding constraints (licensed IP) may require a different slug."

  - id: q-scoring-formula
    question: "Does the game need a multiplicative scoring formula (for leaderboard striation) beyond the 1-3 star rating?"
    context: "GDD specifies star rating (1-3 stars by taps remaining). CoS scoring (core pass) requires multiplicative dimensions. The tap-efficiency star rating is only one dimension. Plan must decide: (a) stars only, or (b) numeric score = base * efficiency_multiplier with wide-range leaderboard striation."

  - id: q-continue-coin-system
    question: "What is the scope of the in-game coin/currency system for the 'Keep Going' continue mechanic?"
    context: "GDD states 'ad or in-game currency (5 coins) for 5 bonus taps'. Coin balance management, earning mechanics, and ad integration are not detailed. Plan must define whether coins are a pre-wired balance or require a currency service."

  - id: q-chapter-asset-scope
    question: "What asset scope is required for launch? GDD specifies 3 chapters × 5 cases (15 scenes), 3 villain rosters, and 5 evidence token types. Are all 15 scene backgrounds and all character sprites expected in the core pass, or does the core pass cover a single chapter (Tutorial + Chapter 1)?"
    context: "This affects the asset manifest, bundle grouping, and hand-crafted level data scope."

  - id: q-star-thresholds
    question: "What are the exact tap-remaining thresholds for 1, 2, and 3 stars per difficulty tier?"
    context: "GDD says '1-3 stars based on taps remaining at case solve' but does not specify cutoffs. Plan must define thresholds per difficulty tier (Easy: 15 taps → 3 stars if ≥ N remaining, etc.)."
