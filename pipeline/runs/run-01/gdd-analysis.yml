      - tests/level-generator.test.ts
    dependencies: [ecs-game-state]
    ux:
      discovery: "N/A — pure generation logic, no direct player-facing UI"
      feedback: "N/A — affects scene layout quality; solvability check ensures always-valid level"
      onboarding: "Hand-crafted Tutorial levels (T1, T2, Ch1-Case1) bypass procedural generation"
    notes: |
      Six steps: Scene Selection → Suspect Pool Assignment → Evidence Placement →
      Locked Hotspot Seeding → Solvability Check → Fallback Chain.
      Seed formula: chapterIndex * 100000 + caseIndex * 1000 + layoutVariantIndex.
      Same seed always produces same layout (deterministic, no Math.random() — seeded RNG per guardrail #9).
      Fallback: up to 10 retries with difficulty-tier reduction; then promotes hand-crafted fallback from fallback-cases.ts.
      Solvability check: simulates optimal play; rejects if tap limit reached before board fills under optimal play.
      HIGH risk: pure logic but central to game correctness; well-tested required.
      Test file needed: tests/level-generator.test.ts with seed determinism and solvability verification.

