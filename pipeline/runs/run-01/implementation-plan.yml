    cos_covered:
      - animated-dynamics
    ux_zones:
      thumb_zone: [out-of-reach]
      touch_targets: [tap-to-skip-button]
      feedback_surfaces: [fullscreen-panel-sequence]
    acceptance:
      # first-time-intro-cutscene
      - given: "player launches game for the very first time (no seenIntro flag)"
        should: "4-panel cutscene auto-plays before Tutorial Level 1; panels crossfade at 500ms intervals; 'tap to skip' affordance visible bottom-right (>= 44pt)"
      - given: "player has already seen the intro (seenIntro=true in localStorage)"
        should: "cutscene is skipped; player routes directly to title screen / tutorial"
      - given: "player taps tap-to-skip during cutscene"
        should: "cutscene immediately exits; routes to Tutorial Level 1; seenIntro persisted"
      - given: "all 4 panels advance to end"
        should: "routes automatically to Tutorial Level 1; seenIntro persisted"
    test_loci:
      - describe: "IntroCutscene: one-time gate and panel sequence"
        file: "tests/clue-chasers/intro-cutscene.test.ts"
        cases:
          - "first launch: cutscene plays (no seenIntro flag)"
          - "subsequent launch: cutscene skipped (seenIntro=true)"
          - "tap-to-skip exits immediately and persists seenIntro"
          - "all 4 panels auto-advance at 500ms"
          - "tap-to-skip button >= 44pt touch target"
    files:
      state:
        - src/game/clue-chasers/data/cutscene-panels.ts
      integration:
        - src/game/clue-chasers/screens/IntroCutscene.ts
        - src/game/clue-chasers/GameController.ts
      test:
