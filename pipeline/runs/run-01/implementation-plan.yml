resolved_questions:
  - question: "What is the game's slug? Replace 'mygame' in src/game/mygame/?"
    decision: "clue-chasers"
    rationale: "Derived from GDD title 'Scooby-Doo: Clue Chasers'. Lowercase, hyphenated, slug-safe. No conflicting branding constraints noted in GDD. Full path: src/game/clue-chasers/"

  - question: "Does the game need a multiplicative scoring formula beyond the 1-3 star rating?"
    decision: "caseScore = basePoints * efficiencyMultiplier where basePoints = 1000 (case complete), efficiencyMultiplier = (tapsRemaining / startingTaps) + 1.0 clamped to [1.0, 2.0]. Stars are a derived display (3 stars = caseScore >= 1500, 2 stars >= 1200, 1 star >= 1000)."
    rationale: "CoS scoring (core pass) requires multiplicative dimensions. Pure star-only rating is a single flat tier. Adding efficiency multiplier (taps remaining / starting taps) gives continuous leaderboard striation: beginner who barely solves scores 1000-1100, expert who solves with many taps remaining scores up to 2000. Two multiplicative dimensions: base completion × efficiency. Star thresholds derived from this formula."

  - question: "What is the scope of the in-game coin/currency system for the 'Keep Going' continue mechanic?"
    decision: "Simple pre-wired integer coin balance stored in ECS resource. No external currency service. Coins start at 0, player earns 10 coins per chapter completion. Loss screen shows coin balance. 'Keep Going' = spend 5 coins for 5 bonus taps. No ad integration in core pass (button present but wired to coin path only)."
    rationale: "Core pass scope: wiring the mechanic without a full economy service. Ad integration is secondary-pass concern. Coin balance persists in localStorage via player prefs."

  - question: "What asset scope is required for the core pass?"
    decision: "Core pass covers Tutorial (T1, T2) + Chapter 1 (5 cases) only. That is 7 scene layouts, 3 villain suspects for Chapter 1, 5 evidence token types, and Scooby companion sprites. Chapters 2-3 are post-launch content. Asset manifest groups: scene-ch1 bundle (Chapter 1 scene backgrounds), scene-tutorial bundle (T1/T2 backgrounds), core-ui bundle (evidence tokens, HUD elements, Scooby sprites)."
    rationale: "15 scenes in full scope would over-scope a single pipeline run. Tutorial + Chapter 1 = complete playable arc. Chapters 2-3 added via separate pipeline runs."

  - question: "What are the exact tap-remaining thresholds for 1, 2, and 3 stars per difficulty tier?"
    decision: "Star thresholds derived from scoring formula (caseScore >= 1500 = 3 stars, >= 1200 = 2 stars, >= 1000 = 1 star). In tap terms: Easy tier (15 start taps): 3 stars if >= 7 remaining (score >= 1467), 2 stars if >= 3 remaining (score >= 1200), 1 star if 0 remaining (score = 1000). Tutorial T2 (12 start taps): counter visible but no star rating shown (tutorial win is always 1-star equivalent, full star rating from Ch1-C1 onward). Hard tier (12 start): 3 stars >= 7 remaining, 2 stars >= 3 remaining, 1 star >= 1."
    rationale: "Derived from efficiencyMultiplier formula. Consistent across tiers relative to starting tap count."

preserve_list: []

batches:

  # ---------------------------------------------------------------------------
  # BATCH 1 — ECS Foundation + GameController (Pixi) + Scene Canvas + Hotspot + Evidence + Clue Board
  # The hook batch: player sees a scene and can tap hotspots. Evidence flies to board.
  # ---------------------------------------------------------------------------
  - id: 1
    name: "Hook — ECS, GameController (Pixi), Scene Canvas, Hotspot, Evidence Token, Clue Board"
    priority: P0
    player_visible: "player sees a scene investigation canvas with shimmering hotspots; tapping a hotspot shows a circular evidence token fly-arc to the Clue Board strip at bottom"
    features:
      - ecs-game-state
      - gameplay-screen
      - hotspot-system
      - evidence-token
      - clue-board
    cos_covered:
      - core-interaction
      - canvas
      - animated-dynamics
      - scoring
    ux_zones:
      thumb_zone: [center, natural]
      touch_targets: [hotspot-tap-44pt, deduce-button]
      feedback_surfaces: [scene-canvas, clue-board-hud, hud-bottom-strip, token-slots, shimmer-animation]
    acceptance:
      # ecs-game-state
      - given: "game initializes"
        should: "ECS plugin mounts with resources tapCounter, clueBoardState, gamePhase, currentScore, starsEarned all at default values; bridgeEcsToSignals wires without error"
      - given: "ECS action tapHotspot is dispatched with a seeded RNG"
        should: "action is pure (no Math.random, no Pixi imports); returns animation metadata object with outcome and position"
      # gameplay-screen
      - given: "GameController.init() is called with a container div"
        should: "Pixi Application mounts on GPU canvas (gameMode = 'pixi'); stage renders scene background sprite; no DOM elements created inside the canvas container"
      - given: "GameController.destroy() is called"
        should: "GSAP tweens killed, Pixi app destroyed, ECS bridge cleaned up, setActiveDb(null) called"
      # hotspot-system
      - given: "scene loads with 3 active hotspots"
        should: "each hotspot has a 44x44pt minimum touch target; shimmer animation (scale 1.0→1.03, 1400ms GSAP loop) plays on each active hotspot"
      - given: "player taps an active hotspot during Investigating phase"
        should: "tap is processed within 100ms; hotspot transitions to spent (dimmed, non-interactive); ECS tapHotspot action fires"
      - given: "player taps during Animating phase (input locked)"
        should: "tap is ignored; no state change; first queued tap after animation completes fires"
      - given: "player taps a locked hotspot"
        should: "padlock-shake animation (150ms) plays; Scooby VO 'Ruh-roh!' cue queued; tap counter NOT decremented"
      # evidence-token
      - given: "tapHotspot returns evidence outcome"
        should: "circular badge (56pt) animates from hotspot position to next open Clue Board slot with 220ms arc tween back.out(1.7)"
      - given: "all 5 Clue Board slots are filled and player taps another evidence hotspot"
        should: "no fly-arc animation; hotspot shows brief shake (120ms); no tap consumed"
      # clue-board
      - given: "evidence token lands in a Clue Board slot"
        should: "slot bounce-in animation (80ms elastic.out) plays; slot shows correct token type emoji fallback"
      - given: "all 5 clue slots fill"
        should: "golden-glow pulse (800ms half-cycle) plays on Clue Board; Deduce! button scales in (300ms back.out)"
      # CoS canvas exit criteria
      - given: "game renders at 390x844 viewport"
        should: "scene canvas occupies >= 688px height (viewport 844 - 56 DOM bottom - 100 Clue Board); no HUD overlaps scene content; hotspot touch targets >= 48x48px visible"
      # CoS scoring: multiplicative formula present
      - given: "case completes"
        should: "caseScore = 1000 * (tapsRemaining/startingTaps + 1.0); score varies with efficiency (1000 minimum, 2000 maximum)"
    test_loci:
      - describe: "ClueChasersPlugin: ECS resources and actions"
        file: "tests/clue-chasers/ecs-plugin.test.ts"
        cases:
          - "mounts with correct default resource values"
          - "tapHotspot action is pure (no Math.random, no Pixi)"
          - "tapHotspot evidence outcome: decrements tapCounter, returns animation metadata"
          - "tapHotspot red-herring outcome: decrements tapCounter, returns puff metadata"
          - "tapHotspot locked-hotspot: does not decrement tapCounter"
          - "fillClueBoardSlot transaction fills slot in order"
          - "caseScore formula: base * efficiency, clamped [1000, 2000]"
      - describe: "HotspotRenderer: touch targets and shimmer"
        file: "tests/clue-chasers/hotspot-renderer.test.ts"
        cases:
          - "each hotspot hitArea >= 44x44pt"
          - "shimmer GSAP tween created with scale 1.0->1.03 at 1400ms"
          - "spent hotspot is non-interactive after tap"
      - describe: "EvidenceToken: fly-arc animation"
        file: "tests/clue-chasers/evidence-token.test.ts"
        cases:
          - "fly-arc tween target is next open Clue Board slot position"
          - "board-full edge case: shake plays, no token created"
      - describe: "ClueBoardRenderer: slots and golden-glow"
        file: "tests/clue-chasers/clue-board-renderer.test.ts"
        cases:
          - "5 slots rendered with correct initial state"
          - "slot bounce-in on token land"
          - "golden-glow activates when all 5 slots filled"
          - "Deduce button scales in (300ms) when board full"
    files:
      state:
        - src/game/clue-chasers/state/ClueChasersPlugin.ts
        - src/game/clue-chasers/state/game-logic.ts
        - src/game/clue-chasers/state/bridgeEcsToSignals.ts
        - src/game/state.ts
      integration:
        - src/game/clue-chasers/GameController.ts
        - src/game/clue-chasers/renderers/SceneRenderer.ts
        - src/game/clue-chasers/renderers/HotspotRenderer.ts
        - src/game/clue-chasers/renderers/EvidenceTokenRenderer.ts
        - src/game/clue-chasers/renderers/ClueBoardRenderer.ts
        - src/game/clue-chasers/renderers/HudRenderer.ts
        - src/game/clue-chasers/asset-manifest.ts
        - src/game/clue-chasers/index.ts
      test:
        - tests/clue-chasers/ecs-plugin.test.ts
        - tests/clue-chasers/hotspot-renderer.test.ts
        - tests/clue-chasers/evidence-token.test.ts
        - tests/clue-chasers/clue-board-renderer.test.ts
    how:
      - "Replace DOM-mode gameController.ts stub: rename src/game/mygame/ → src/game/clue-chasers/; set gameMode='pixi'; mount Pixi Application with resizeTo container. Wire ECS plugin init: Database.create(ClueChasersPlugin) → setActiveDb → bridgeEcsToSignals. Layers: bgLayer, sceneLayer, hudLayer (eventMode per gpu-vs-dom.mdc rule)."
      - "ClueChasersPlugin: resources (tapCounter, clueBoardState[5], gamePhase, currentScore, starsEarned, selectedSuspect, correctSuspect, coinBalance). Actions (tapHotspot, accuse, retryCase, continueCase) pure: no Math.random, no Pixi. Transactions (decrementTapCounter, fillClueBoardSlot, setGamePhase, addScore). Plugin property order: resources → transactions → actions."
      - "HotspotRenderer: creates Container per hotspot with hitArea Rectangle(0,0,44,44); emoji fallback (🔍) as Text until atlas loads; shimmer via gsap.to(sprite, {pixi:{scaleX:1.03,scaleY:1.03}, duration:0.7, yoyo:true, repeat:-1}). EvidenceTokenRenderer: arc tween from tapPos to slot position using GSAP motionPath or x/y tween with cubic ease. ClueBoardRenderer: 5 slot containers bottom HUD strip 100px tall."
    definition_of_done:
      - "acceptance[] tests go red then green (all 13 acceptance rows covered)"
      - "integration call site exists at src/game/clue-chasers/GameController.ts"
      - "every file in files.integration is exercised by at least one acceptance test"
      - "CoS sub-walk clean for core-interaction, canvas, animated-dynamics, scoring"
      - "touch targets >= 44px and feedback surfaces present per ux_zones"
      - "screen root (GameScreen.tsx) consumes reserved_bottom_px=56 as padding; Clue Board consumes 100px bottom of GPU canvas"
      - "no DOM createElement or CSS inside src/game/clue-chasers/ (guardrail #1)"
      - "no stubs or placeholder text visible in GPU canvas (guardrail #15)"
      - "src/game/mygame/ renamed to src/game/clue-chasers/; no literal 'mygame' in new files"
      - "bun run build + bun run test pass within 3 fix cycles"
    risk: HIGH
    risk_reason: "GameController is central integration point. ECS plugin is source of truth for all state. Touches renderer, input, ECS, layout simultaneously. Failure blocks all downstream batches."
    rollback: "If Pixi Application fails to mount or ECS plugin throws, revert GameController to DOM mode (restore stub) and fix plugin error before proceeding."

  # ---------------------------------------------------------------------------
  # BATCH 2 — Tap Counter + Scoring Formula + Win/Loss ECS State + Results Screen (win)
  # Player can complete a case and see star rating.
  # ---------------------------------------------------------------------------
  - id: 2
    name: "Core Loop Completion — Tap Counter, Scoring, Win State, Level Complete Screen"
    priority: P0
    player_visible: "player sees tap counter decrement with scale-pop on each evidence/red-herring tap; solving case triggers level-complete screen with 1-3 star rating and Next Case button"
    features:
      - tap-counter
      - scoring-star-rating
      - level-complete-screen
    cos_covered:
      - canvas
      - animated-dynamics
      - scoring
    ux_zones:
      thumb_zone: [out-of-reach, center]
      touch_targets: [next-case-button]
      feedback_surfaces: [hud-top-right, tap-counter-widget, star-fill-animation, level-complete-screen, unmasking-flip-card]
    acceptance:
      # tap-counter
      - given: "player taps an evidence or red-herring hotspot"
        should: "tap counter decrements by 1; scale-pop animation (1.0→1.15→1.0, 120ms back.out) fires on counter widget"
      - given: "tap counter reaches <= 3"
        should: "counter widget pulses red tint (300ms loop x3) as warning feedback"
      - given: "tap counter reaches 0 with clue board not full"
        should: "loss sequence triggers immediately (gamePhase transitions to Loss)"
      - given: "empty-hotspot tap (no outcome)"
        should: "tap counter does NOT decrement; no animation on counter"
      # scoring-star-rating
      - given: "case is solved (correct accusation)"
        should: "caseScore = 1000 * (tapsRemaining/startingTaps + 1.0); starsEarned = 3 if caseScore >= 1500, 2 if >= 1200, 1 if >= 1000"
      - given: "Tutorial Level 1 case ends"
        should: "star rating is not displayed (tutorial T1 auto-win, no star UI)"
      # level-complete-screen
      - given: "correct accusation is made and win sequence triggers"
        should: "ResultsScreen renders with win variant: villain name banner, 1-3 star fill animation (200ms per star sequential), Next Case button bottom-center"
      - given: "player taps Next Case button"
        should: "gameState advances to next case index; screen transitions to game screen"
      # CoS scoring cross-check: multiplicative dimensions
      - given: "two players solve the same case; player A has 12 taps remaining, player B has 2 taps remaining (Easy tier, 15 start)"
        should: "player A score >= 1800, player B score <= 1133; difference >= 600 (continuous striation)"
    test_loci:
      - describe: "TapCounter: decrement and warning states"
        file: "tests/clue-chasers/tap-counter.test.ts"
        cases:
          - "evidence tap decrements counter by 1"
          - "red-herring tap decrements counter by 1"
          - "empty tap does not decrement"
          - "counter at 3 triggers warning-pulse"
          - "counter at 0 triggers loss phase transition"
      - describe: "Scoring: star rating thresholds"
        file: "tests/clue-chasers/scoring.test.ts"
        cases:
          - "caseScore formula: base * efficiency, 1000 min 2000 max"
          - "3-star threshold: caseScore >= 1500"
          - "2-star threshold: caseScore >= 1200"
          - "1-star threshold: caseScore >= 1000"
          - "two-player striation: high efficiency >> low efficiency"
      - describe: "ResultsScreen: win variant"
        file: "tests/clue-chasers/results-win.test.ts"
        cases:
          - "win variant renders star fill animation (not Game Over text)"
          - "Next Case button navigates to game screen"
          - "screen consumes reserved_bottom_px=56 as padding"
    files:
      state:
        - src/game/clue-chasers/state/ClueChasersPlugin.ts
        - src/game/clue-chasers/state/game-logic.ts
      integration:
        - src/game/clue-chasers/renderers/HudRenderer.ts
        - src/game/clue-chasers/GameController.ts
        - src/game/screens/ResultsScreen.tsx
      test:
        - tests/clue-chasers/tap-counter.test.ts
        - tests/clue-chasers/scoring.test.ts
        - tests/clue-chasers/results-win.test.ts
    how:
      - "Add tapCounter resource decrement in ClueChasersPlugin.transactions.decrementTapCounter; emit 'tapCounterChanged' animation event. HudRenderer.updateTapCounter(): GSAP scale-pop on counter widget; warning pulse when value <= 3. Tap counter widget at top-right HUD (Stretching zone per UX guidelines)."
      - "Add scoring formula in game-logic.ts: computeScore(tapsRemaining, startingTaps). Add starsEarned transaction that derives from caseScore thresholds. bridgeEcsToSignals must propagate starsEarned to SolidJS signal."
      - "Replace ResultsScreen.tsx 'Game Over' heading and generic score with: win/loss variant prop from gameState signal; win path shows villain name (from caseLayout data), star-fill animation (GSAP sequential), Next Case button at bottom-center."
    definition_of_done:
      - "acceptance[] tests go red then green (all 9 rows covered)"
      - "integration call site exists at GameController.ts and HudRenderer.ts"
      - "every file in files.integration exercised by at least one acceptance test"
      - "CoS sub-walk clean for canvas, animated-dynamics, scoring"
      - "tap counter visible at top-right; no overlap with scene content"
      - "ResultsScreen win variant: no 'Game Over' text; star animation present"
      - "screen root consumes reserved_bottom_px=56"
      - "bun run build + bun run test pass within 3 fix cycles"
    risk: MEDIUM
    risk_reason: "ResultsScreen.tsx is a modified_file (content-gap replacement). Star animation timing must be correct. Scoring formula touches ECS plugin."

  # ---------------------------------------------------------------------------
  # BATCH 3 — Loss Screen + Continue System
  # Player can lose a case, see gentle failure, and try again or keep going.
  # ---------------------------------------------------------------------------
  - id: 3
    name: "Loss Path — Loss Screen, Try Again, Continue System (Keep Going)"
    priority: P0
    player_visible: "when tap counter hits 0, scene desaturates, loss overlay appears with 'The mystery got away…' text; Try Again and Keep Going buttons visible; Keep Going spends 5 coins for 5 bonus taps"
    features:
      - loss-screen
      - continue-system
    cos_covered:
      - animated-dynamics
    ux_zones:
      thumb_zone: [center]
      touch_targets: [try-again-button, keep-going-button]
      feedback_surfaces: [scene-desaturate, loss-overlay, try-again-cta]
    acceptance:
      # loss-screen
      - given: "tap counter reaches 0 with clue board not full"
        should: "scene desaturates (GSAP tint shift to grayscale, 350ms); loss overlay fades in (350ms); 'The mystery got away… for now!' text types in (400ms); no 'Game Over' text"
      - given: "loss screen is showing"
        should: "Try Again is primary CTA (bottom-center, >= 44pt); Keep Going is secondary CTA below it; Scooby droop-ears animation plays"
      - given: "player taps Try Again"
        should: "same case reloads with seed+1 (fresh layout); tap counter resets to starting value"
      # continue-system
      - given: "player taps Keep Going with coinBalance >= 5"
        should: "coinBalance decrements by 5; tapCounter restores to 5 (bonus taps); player returned to game at exact point of loss; loss overlay dismissed"
      - given: "player taps Keep Going with coinBalance < 5"
        should: "Keep Going button shows 'Not enough coins' feedback (shake, 200ms); no state change; player remains on loss screen"
    test_loci:
      - describe: "LossScreen: overlay and language"
        file: "tests/clue-chasers/loss-screen.test.ts"
        cases:
          - "loss overlay text is 'The mystery got away' (not 'Game Over')"
          - "scene desaturate tween fires on loss phase transition"
          - "Try Again reloads case with seed+1"
      - describe: "ContinueSystem: coin spend and tap restore"
        file: "tests/clue-chasers/continue-system.test.ts"
        cases:
          - "Keep Going with >= 5 coins: coinBalance -= 5, tapCounter += 5, returns to game"
          - "Keep Going with < 5 coins: shake feedback, no state change"
    files:
      state:
        - src/game/clue-chasers/state/ClueChasersPlugin.ts
        - src/game/clue-chasers/screens/lossScreen.ts
      integration:
        - src/game/screens/ResultsScreen.tsx
        - src/game/clue-chasers/GameController.ts
      test:
        - tests/clue-chasers/loss-screen.test.ts
        - tests/clue-chasers/continue-system.test.ts
    how:
      - "Add loss variant to ResultsScreen.tsx (parallel to win variant from batch 2); switch on gameState.gameOutcome signal (win|loss). Loss path: 'The mystery got away… for now!' heading, Scooby droop emoji fallback, Try Again primary button, Keep Going secondary with coin cost displayed."
      - "Add coinBalance resource to ClueChasersPlugin; continueCase action: checks coinBalance >= 5, decrements, restores tapCounter to 5, sets gamePhase back to Investigating. retryCase action: increments seed, resets full case state."
      - "GameController loss sequence: on Loss phase transition, GSAP tint shift on sceneLayer to grayscale, fade in DOM overlay via signal. Loss overlay is DOM (ResultsScreen variant), not GPU — acceptable as results screen shell."
    definition_of_done:
      - "acceptance[] tests go red then green (all 5 rows covered)"
      - "integration call site exists at ResultsScreen.tsx and GameController.ts"
      - "every file in files.integration exercised by at least one acceptance test"
      - "CoS sub-walk clean for animated-dynamics"
      - "no 'Game Over' text in any loss-path element"
      - "Try Again and Keep Going buttons >= 44pt; >= 8px spacing between them"
      - "screen root consumes reserved_bottom_px=56"
      - "bun run build + bun run test pass within 3 fix cycles"
    risk: MEDIUM
    risk_reason: "ResultsScreen is modified again (third variant branch). Loss phase transition must coordinate GPU desaturate + DOM overlay."

  # ---------------------------------------------------------------------------
  # BATCH 4 — Tutorial System + Hand-Crafted Levels
  # Player is onboarded through T1 and T2 with ghost-finger and Scooby dialogue.
  # ---------------------------------------------------------------------------
  - id: 4
    name: "Tutorial — Hand-Crafted Levels T1/T2, Ghost-Finger Pointer, Scooby Dialogue"
    priority: P1
    player_visible: "first launch shows Tutorial Level 1 (library, 3 evidence, no fail); ghost-finger pointer pulses on most obvious hotspot after 1s; Scooby speech bubble says 'Rikes! Someone's been in here!'; Tutorial Level 2 introduces tap counter and red herring"
    features:
      - tutorial-system
      - hand-crafted-levels
    cos_covered:
      - core-interaction
      - animated-dynamics
    ux_zones:
      thumb_zone: [center]
      touch_targets: [hotspot-tap-targets]
      feedback_surfaces: [scene-canvas, ghost-finger-pointer, speech-bubble]
    acceptance:
      # tutorial-system
      - given: "player launches the game for the first time"
        should: "Tutorial Level 1 loads (library scene, 3 evidence slots visible, 2 locked); ghost-finger pointer appears 1s after load on most obvious hotspot; pointer pulses twice then fades (fires once only)"
      - given: "player is in Tutorial Level 1"
        should: "tap counter is hidden (internal cap 20 taps); Deduction Phase is skipped (auto-win after board fills); progress bar hidden"
      - given: "player taps a hotspot in Tutorial Level 1 for the first time"
        should: "Scooby pre-level speech bubble shows 'Rikes! Someone's been in here, Shaggy! Let\u2019s look around!' (2.5s auto-dismiss)"
      - given: "player completes Tutorial Level 1"
        should: "Tutorial Level 2 loads automatically (mansion foyer, 5 hotspots: 3 evidence + 1 red herring + 1 empty); tap counter visible starting at 12"
      - given: "player taps first red herring hotspot in T2"
        should: "Scooby shrug reaction plays (once only); 'wah-wah' SFX queued"
      # hand-crafted-levels
      - given: "Tutorial levels are loaded"
        should: "hand-crafted-cases.ts provides T1 and T2 CaseLayout objects; procedural generator is NOT called for tutorial levels"
      - given: "hand-crafted-cases.ts is loaded"
        should: "T1 has clueSlotsRequired=3, tapLimit=20, isIntro=true; T2 has clueSlotsRequired=5, tapLimit=12, isIntro=false"
    test_loci:
      - describe: "TutorialSystem: ghost-finger and phase gating"
        file: "tests/clue-chasers/tutorial-system.test.ts"
        cases:
          - "ghost-finger pointer fires once on first session only"
          - "Tutorial L1: tap counter hidden, Deduction skipped"
          - "Tutorial L2: tap counter visible at 12, Deduction Phase enabled"
          - "first red herring tap in T2 triggers shrug reaction (once only)"
      - describe: "HandCraftedLevels: static layout data"
        file: "tests/clue-chasers/hand-crafted-cases.test.ts"
        cases:
          - "T1 layout: clueSlotsRequired=3, tapLimit=20"
          - "T2 layout: clueSlotsRequired=5, tapLimit=12, red herring present"
          - "hand-crafted pool length >= 2 (T1 + T2)"
    files:
      state:
        - src/game/clue-chasers/data/hand-crafted-cases.ts
        - src/game/clue-chasers/data/scooby-dialogue.ts
      integration:
        - src/game/clue-chasers/GameController.ts
        - src/game/clue-chasers/screens/gameController.ts
      test:
        - tests/clue-chasers/tutorial-system.test.ts
        - tests/clue-chasers/hand-crafted-cases.test.ts
    how:
      - "Create hand-crafted-cases.ts with typed CaseLayout[] array. T1: library scene, 3 active hotspot positions, 0 red herrings, 0 locked hotspots, clueSlotsRequired=3, tapLimit=20, isIntro=true. T2: mansion foyer, 5 hotspot positions, 1 red herring, tapLimit=12, isIntro=false. Mark with preserveAcrossPipeline: true per GDD note."
      - "TutorialSystem in GameController: reads isIntro from caseLayout. If isIntro: hide tap counter widget (alpha 0), bypass Deduction Phase trigger, cap internal taps at 20. Ghost-finger pointer: GSAP-animated Container with paw emoji ('🐾') that scales 1.0→1.2→1.0 (600ms loop x2) then alpha→0; fires after delayedCall(1s)."
      - "Scooby dialogue: pre/post-level speech bubble DOM overlay (SolidJS signal-driven) with text from scooby-dialogue.ts keyed by caseId + event. Auto-dismiss via GSAP delayedCall(2.5s). First-red-herring reaction: one-shot flag in ECS resource (firstRedHerringReacted), set on first T2 red herring tap."
    definition_of_done:
