  # ---------------------------------------------------------------------------
  # BATCH 11 — Scene Pan (Wide Scene)
  # Player can pan wide scenes on chapter-end cases.
  # ---------------------------------------------------------------------------
  - id: 11
    name: "Wide Scene Pan — Horizontal Momentum-Damped Swipe"
    priority: P2
    player_visible: "on chapter-end wide-scene cases, player can swipe horizontally to pan the scene; panning has momentum damping and snaps to bounds; panning does not consume a tap"
    features:
      - scene-pan
    cos_covered:
      - core-interaction
    ux_zones:
      thumb_zone: [center]
      touch_targets: [full-scene-swipe-area]
      feedback_surfaces: [scene-canvas]
    acceptance:
      # scene-pan
      - given: "player swipes horizontally on a wide-scene case"
        should: "scene pans smoothly with momentum damping; GSAP spring-like deceleration after finger lift; scene does not scroll vertically"
      - given: "scene reaches horizontal bounds"
        should: "pan snaps to bounds (rubber-band then snap); cannot swipe past scene edge"
      - given: "player quickly taps a hotspot on a wide scene without swiping"
        should: "tap registers on hotspot normally; pan gesture does NOT activate (threshold-gated: < 12px = tap)"
      - given: "scene is panning"
        should: "tap on hotspot is ignored during active pan momentum; input not consumed"
    test_loci:
      - describe: "ScenePan: gesture discrimination and bounds"
        file: "tests/clue-chasers/scene-pan.test.ts"
        cases:
          - "horizontal drag > 12px triggers pan (not tap)"
          - "vertical drag does not trigger pan"
          - "momentum deceleration: velocity decays on pointer-up"
          - "bounds snap: pan cannot go past scene edges"
          - "active pan: hotspot tap not registered during momentum"
    files:
      state:
        - src/game/clue-chasers/state/ClueChasersPlugin.ts
      integration:
        - src/game/clue-chasers/renderers/SceneRenderer.ts
        - src/game/clue-chasers/GameController.ts
      test:
        - tests/clue-chasers/scene-pan.test.ts
    how:
      - "SceneRenderer: pointermove delta tracking. Pan activates when horizontalDelta > 12px and no tap threshold hit. GSAP momentum: on pointerup, gsap.to(sceneContainer, {x: targetX, ease:'power2.out', duration:0.4}) with velocity carry-over. Bounds: clamp x to [-(sceneWidth - viewportWidth), 0]."
      - "Tap discrimination: record pointerdown position; if pointerup.x delta < 12px → tap event; if > 12px → pan consumed gesture. Pan and hotspot tap are mutually exclusive gesture branches."
    definition_of_done:
      - "acceptance[] tests go red then green (all 4 rows covered)"
      - "integration call site exists at SceneRenderer.ts and GameController.ts"
      - "every file in files.integration exercised by at least one acceptance test"
      - "CoS sub-walk clean for core-interaction"
      - "pan gesture discrimination: < 12px = tap, >= 12px = pan"
      - "no requestAnimationFrame for pan momentum (guardrail #3)"
      - "bun run build + bun run test pass within 3 fix cycles"
    risk: MEDIUM
    risk_reason: "Gesture discrimination between tap and pan on the same container is subtle. Wrong threshold or event model causes hotspots to misfire on pan."

  # ---------------------------------------------------------------------------
  # BATCH 12 — First-Time Intro Cutscene
  # Player gets the 4-panel comic origin story on very first launch.
  # ---------------------------------------------------------------------------
  - id: 12
    name: "Story — First-Time Intro Cutscene (4-panel comic)"
    priority: P2
    player_visible: "on very first launch only, 4-panel animated comic plays automatically: Scooby sniffs → evidence flies → suspect cards → unmasking; tap-to-skip bottom-right; auto-advances at 500ms per panel"
    features:
