    how:
      - "IntroCutscene.ts: GPU Container (Pixi, fullscreen). 4 panel containers with emoji/text fallback: Panel 1 '🐕💨' (Scooby sniffs), Panel 2 '🔍✨' (evidence flies), Panel 3 '🃏🃏🃏' (suspect cards), Panel 4 '🎭😱' (unmasking). GSAP delayedCall(0.5) auto-advance. Tap-to-skip: static button Container bottom-right with pointer event."
      - "seenIntro flag: localStorage.setItem('cc_seenIntro', '1'). Read in GameController before showing cutscene. GSAP delayedCall drives sequencing (no setTimeout per guardrail #3)."
