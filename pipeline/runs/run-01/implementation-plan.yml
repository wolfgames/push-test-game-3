    risk: HIGH
    risk_reason: "Scene generation algorithm with solvability check is central to game correctness. Incorrect seeding or solvability logic produces unplayable levels. Comprehensive test coverage required."
    rollback: "If solvability check is buggy, disable procedural generation and fall back to hand-crafted cases only. Flag in carry_forward."

