    acceptance:
      # scene-generation-algorithm
      - given: "generateLevel(seed=1_001_000, difficultyTier='Easy') is called"
        should: "returns identical CaseLayout on every call (deterministic seeding)"
      - given: "generateLevel is called with different seed values"
        should: "returns different hotspot positions (non-deterministic across seeds)"
      - given: "generateLevel produces a layout"
        should: "solvability check passes: simulated optimal play fills clue board before tapLimit exhausted"
      - given: "solvability check fails after 10 retries"
        should: "fallback chain promotes corresponding hand-crafted case from fallback-cases.ts"
      # difficulty-curve
      - given: "Chapter 1 Cases 1-2 are generated at Easy tier"
        should: "clueSlotsRequired=3, tapLimit=15, lockedHotspotCount=0"
      - given: "Chapter 1 Cases 3-5 are generated at Easy+ tier"
        should: "clueSlotsRequired=5, tapLimit=15, lockedHotspotCount=1"
      # content-sufficiency: fallback pool
      - given: "fallback-cases.ts is loaded"
        should: "fallback pool length >= 7 (T1, T2, Ch1-C1 through Ch1-C5)"
    test_loci:
      - describe: "LevelGenerator: determinism and solvability"
        file: "tests/clue-chasers/level-generator.test.ts"
        cases:
          - "seed determinism: same seed always returns same layout"
          - "different seeds return different layouts"
          - "solvability: simulated play fills board before tapLimit"
          - "fallback chain: after 10 retries, hand-crafted fallback promoted"
          - "seed formula: chapterIndex*100000 + caseIndex*1000 + variantIndex"
      - describe: "DifficultyTiers: parameter correctness"
        file: "tests/clue-chasers/difficulty-tiers.test.ts"
        cases:
          - "Easy tier: clueSlotsRequired=3, tapLimit=15"
          - "Easy+ tier: clueSlotsRequired=5, tapLimit=15, lockedHotspots=1"
          - "no jump > 1 difficulty unit between consecutive cases"
    files:
      state:
        - src/game/clue-chasers/state/levelGenerator.ts
        - src/game/clue-chasers/state/game-logic.ts
        - src/game/clue-chasers/data/difficulty-tiers.ts
        - src/game/clue-chasers/data/hand-crafted-cases.ts
        - src/game/clue-chasers/data/fallback-cases.ts
        - src/game/clue-chasers/data/chapters.ts
      integration:
        - src/game/clue-chasers/GameController.ts
      test:
        - tests/clue-chasers/level-generator.test.ts
        - tests/clue-chasers/difficulty-tiers.test.ts
    how:
      - "levelGenerator.ts: pure function generateLevel(seed, difficultyTier) → CaseLayout. Six steps: (1) scene selection (hash from seed), (2) suspect pool from chapters.ts, (3) evidence placement (seeded shuffle), (4) locked hotspot seeding, (5) solvability check (greedy simulation: always pick evidence over red-herring), (6) fallback chain (retry with tier reduction up to 10x, then fallback-cases.ts lookup). No Math.random — use seeded PRNG (mulberry32 or xorshift). Seed formula: chapterIndex*100000 + caseIndex*1000 + variantIndex."
      - "difficulty-tiers.ts: typed record mapping tier name to {clueSlotsRequired, tapLimit, lockedHotspotCount, redHerringCount}. Tiers: Intro, Easy, Easy+, Medium, Medium+, Hard. Chapter-to-tier mapping in chapters.ts."
      - "chapters.ts: Chapter 1 data: id='chapter-1', title='The Haunted Mansion Mystery', cases=[Ch1-C1 through Ch1-C5], suspects=[{name:'Caretaker Jones', motive:'Hidden treasure'},{name:'Professor Whitmore', motive:'Research cover-up'},{name:'Mayor Bellweather', motive:'Land development'}], correctSuspectId='mayor-bellweather-ch1'. Case 1 uses hand-crafted layout; Cases 2-5 use procedural generator."
    definition_of_done:
      - "acceptance[] tests go red then green (all 7 rows covered)"
      - "integration call site exists at GameController.ts (loadCase calls generateLevel or hand-crafted-cases)"
      - "every file in files.integration exercised by at least one acceptance test"
